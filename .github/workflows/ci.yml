name: Enterprise SaaS CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-build:
    name: Validate and Build GRC Platform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Enforce Code Styling (Linting)
        run: npm run lint

      - name: Validate TypeScript Compilation (Typecheck)
        run: npm run typecheck

      - name: DevSecOps Key & Secrets Integrity Scan
        run: npm run security:secrets

      - name: DevSecOps Vulnerability Audit
        run: npm run security:audit

      - name: Execute Vitest Test Suites
        run: npm run test

      - name: Verify Production Bundler Build
        run: npm run build
